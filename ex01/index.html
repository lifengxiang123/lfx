<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Vue</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        #app {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #667eea;
            margin: 0;
        }
        p {
            color: #666;
            margin-top: 10px;
        }
        .input-section {
            margin-top: 30px;
        }
        input {
            padding: 10px 15px;
            border: 2px solid #667eea;
            border-radius: 5px;
            font-size: 16px;
            width: 300px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #764ba2;
        }
        .output {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            min-height: 20px;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>{{ message }}</h1>
        <p>{{ description }}</p>

        <div class="input-section">
            <input
                v-model="userInput"
                @input="handleInput"
                type="text"
                placeholder="请输入内容..."
            />
            <div class="output">
                <div v-if="userInput">您输入的内容：{{ userInput }}</div>
                <div v-else style="color: #999;">等待输入...</div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    message: 'Hello World!',
                    description: '这是一个简单的 Vue.js 应用',
                    userInput: ''
                }
            },
            methods: {
                handleInput() {
                    console.log('当前输入：', this.userInput);
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
